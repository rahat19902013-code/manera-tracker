<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANERA — Трекер Заруб</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0f;
  --bg2: #111418;
  --bg3: #181c22;
  --card: #1a1f27;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --green: #00e67a;
  --green2: #00b85f;
  --green-dim: rgba(0,230,122,0.12);
  --red: #ff4757;
  --red-dim: rgba(255,71,87,0.12);
  --amber: #ffb300;
  --amber-dim: rgba(255,179,0,0.12);
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --text: #f0f2f5;
  --text2: #8b909a;
  --text3: #555b66;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,230,122,0.4);
}
.logo span { color: var(--text2); font-weight: 400; font-size: 13px; letter-spacing: 1px; margin-left: 8px; }
.header-right { display: flex; gap: 8px; align-items: center; }

/* TABS */
.tabs {
  display: flex;
  gap: 2px;
  padding: 12px 20px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.tab {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 9px 18px;
  cursor: pointer;
  color: var(--text3);
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--green); border-bottom-color: var(--green); }

/* PAGES */
.page { display: none; padding: 20px; }
.page.active { display: block; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
}
.form-group input,
.form-group select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
  -webkit-appearance: none;
}
.form-group input:focus,
.form-group select:focus { border-color: var(--green); }
.form-group input::placeholder { color: var(--text3); }
.form-group select option { background: var(--bg3); }

.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 16px;
}
.section-card-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
}

/* BUTTONS */
.btn-primary {
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 11px 20px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  transition: background 0.15s, transform 0.1s;
}
.btn-primary:hover { background: var(--green2); }
.btn-primary:active { transform: scale(0.98); }
.btn-danger {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(255,71,87,0.25);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-danger:hover { background: rgba(255,71,87,0.2); }

/* METRICS */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 18px; }
.metric-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.metric-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.metric-val { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); }
.metric-val.green { color: var(--green); }
.metric-val.red { color: var(--red); }
.metric-val.amber { color: var(--amber); }
.metric-val.blue { color: var(--blue); }

/* TABLE */
.table-wrap { overflow-x: auto; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* BADGES */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 5px;
}
.b-s { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,122,0.2); }
.b-a { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(77,159,255,0.2); }
.b-b { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,0,0.2); }
.b-c { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,71,87,0.2); }
.b-win { background: var(--green-dim); color: var(--green); }
.b-lose { background: var(--red-dim); color: var(--red); }
.b-tp { background: var(--amber-dim); color: var(--amber); }
.b-draw { background: var(--blue-dim); color: var(--blue); }

/* BAR */
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-track { flex: 1; background: var(--bg3); border-radius: 3px; height: 5px; overflow: hidden; }
.bar-fill { height: 5px; border-radius: 3px; }

/* PLAYER CARD */
.player-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.player-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
  flex-shrink: 0;
}
.player-info { flex: 1; min-width: 0; }
.player-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.player-stats { font-size: 11px; color: var(--text2); }

/* SCOUT */
.scout-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.scout-name { font-weight: 600; font-size: 14px; }
.scout-guild { font-size: 11px; color: var(--text3); margin-top: 1px; }
.scout-meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
.rec-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.rec-hot { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,122,0.25); }
.rec-mid { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(77,159,255,0.25); }
.rec-low { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,71,87,0.25); }

/* MSG */
.msg { font-size: 12px; padding: 9px 13px; border-radius: 8px; margin-top: 10px; font-weight: 500; display: none; }
.msg.show { display: block; }
.msg-ok { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,122,0.2); }
.msg-err { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,71,87,0.2); }

/* EMPTY */
.empty { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 13px; }

/* TIER LEGEND */
.tier-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.tier-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.tier-item-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.tier-item-names { font-size: 12px; color: var(--text2); }

/* SCORE DISPLAY */
.score-display {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* CONFIRM DIALOG */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.dialog {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 24px;
  max-width: 320px;
  width: 90%;
  text-align: center;
}
.dialog h3 { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.dialog p { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
.dialog-btns { display: flex; gap: 10px; }
.dialog-btns button { flex: 1; padding: 10px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; }
.dialog-cancel { background: var(--bg3); color: var(--text2); }
.dialog-confirm { background: var(--red); color: #fff; }

/* RESPONSIVE */
@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-grid3 { grid-template-columns: 1fr 1fr; }
  .tier-row { grid-template-columns: 1fr 1fr; }
  .tabs { overflow-x: auto; padding-bottom: 0; }
  .tab { font-size: 12px; padding: 8px 13px; white-space: nowrap; }
  .player-card { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">MANERA <span>SNS TRACKER</span></div>
  <div class="header-right">
    <button class="btn-danger" onclick="showClearDialog()">Сбросить</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add', this)">+ Добавить</button>
  <button class="tab" onclick="switchTab('stats', this)">Статистика</button>
  <button class="tab" onclick="switchTab('scout', this)">Скаутинг</button>
  <button class="tab" onclick="switchTab('history', this)">История</button>
</div>

<!-- ADD PAGE -->
<div id="page-add" class="page active">
  <div class="section-card">
    <div class="section-card-title">Игроки</div>
    <div class="form-grid" style="margin-bottom:12px">
      <div class="form-group">
        <label>Наш игрок</label>
        <input type="text" id="our-player" placeholder="Арген">
      </div>
      <div class="form-group">
        <label>Соперник</label>
        <input type="text" id="enemy-player" placeholder="Вертинг">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Гильдия соперника</label>
        <input type="text" id="enemy-guild" placeholder="9B SNS">
      </div>
      <div class="form-group">
        <label>Этап</label>
        <select id="stage">
          <option value="group">Групповой этап</option>
          <option value="playoff">Вылетной этап</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-card-title">Счёт и хэды</div>
    <div class="form-grid3" style="margin-bottom:12px">
      <div class="form-group">
        <label>Счёт (наш)</label>
        <input type="number" id="score-us" min="0" max="9" placeholder="4">
      </div>
      <div class="form-group">
        <label>Счёт (враг)</label>
        <input type="number" id="score-them" min="0" max="9" placeholder="1">
      </div>
      <div class="form-group">
        <label>Дисциплина</label>
        <select id="tp">
          <option value="none">Нет</option>
          <option value="tp-us">ТП нашему</option>
          <option value="tp-them">ТП сопернику</option>
          <option value="walko">Незаход врага</option>
        </select>
      </div>
    </div>
    <div class="form-grid3">
      <div class="form-group">
        <label>Хэды (наш)</label>
        <input type="number" id="heads-us" min="0" placeholder="3">
      </div>
      <div class="form-group">
        <label>Тела (наш)</label>
        <input type="number" id="bodies-us" min="0" placeholder="1">
      </div>
      <div class="form-group">
        <label>Хэды (враг)</label>
        <input type="number" id="heads-them" min="0" placeholder="1">
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-card-title">Урон</div>
    <div class="form-grid" style="margin-bottom:12px">
      <div class="form-group">
        <label>Урон (наш)</label>
        <input type="number" id="dmg-us" min="0" placeholder="1500">
      </div>
      <div class="form-group">
        <label>Урон (враг)</label>
        <input type="number" id="dmg-them" min="0" placeholder="900">
      </div>
    </div>
    <div class="form-group">
      <label>Заметка</label>
      <input type="text" id="note" placeholder="Камбек 0:3 → 4:3, слил начало...">
    </div>
  </div>

  <button class="btn-primary" onclick="addBattle()">Добавить бой</button>
  <div id="add-msg" class="msg"></div>
</div>

<!-- STATS PAGE -->
<div id="page-stats" class="page">
  <div id="stats-content"><div class="empty">Нет данных. Добавь бои на вкладке "+ Добавить"</div></div>
</div>

<!-- SCOUT PAGE -->
<div id="page-scout" class="page">
  <div id="scout-content"><div class="empty">Нет данных о соперниках</div></div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div id="history-content"><div class="empty">История пуста</div></div>
</div>

<!-- CONFIRM DIALOG -->
<div id="overlay" class="overlay">
  <div class="dialog">
    <h3>Сбросить всё?</h3>
    <p>Все данные о боях будут удалены. Это действие нельзя отменить.</p>
    <div class="dialog-btns">
      <button class="dialog-cancel" onclick="hideClearDialog()">Отмена</button>
      <button class="dialog-confirm" onclick="confirmClear()">Удалить</button>
    </div>
  </div>
</div>

<script>
const STORE_KEY = 'manera_tracker_v3';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e) { return []; }
}
function save(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e) {}
}

function switchTab(t, el) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-'+t).classList.add('active');
  if(t==='stats') renderStats();
  if(t==='scout') renderScout();
  if(t==='history') renderHistory();
}

function g(id) { return document.getElementById(id).value.trim(); }
function n(id) { return parseInt(document.getElementById(id).value) || 0; }

function addBattle() {
  const ourPlayer = g('our-player');
  const enemyPlayer = g('enemy-player');
  if(!ourPlayer || !enemyPlayer) {
    showMsg('add-msg', 'Укажи ники обоих игроков!', false);
    return;
  }
  const scoreUs = n('score-us');
  const scoreThem = n('score-them');
  const tp = g('tp');

  let result;
  if(tp === 'walko') result = 'win';
  else if(tp === 'tp-us') result = 'tp';
  else if(scoreUs > scoreThem) result = 'win';
  else if(scoreUs < scoreThem) result = 'lose';
  else result = 'draw';

  const battles = load();
  battles.push({
    id: Date.now(),
    ourPlayer,
    enemyPlayer,
    enemyGuild: g('enemy-guild'),
    stage: g('stage'),
    scoreUs, scoreThem,
    headsUs: n('heads-us'),
    bodiesUs: n('bodies-us'),
    headsThem: n('heads-them'),
    dmgUs: n('dmg-us'),
    dmgThem: n('dmg-them'),
    tp,
    note: g('note'),
    result
  });
  save(battles);

  ['our-player','enemy-player','enemy-guild','score-us','score-them','heads-us','bodies-us','heads-them','dmg-us','dmg-them','note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('tp').value = 'none';
  document.getElementById('stage').value = 'group';
  showMsg('add-msg', 'Бой добавлен!', true);
}

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.className = 'msg show ' + (ok ? 'msg-ok' : 'msg-err');
  el.textContent = text;
  setTimeout(() => { el.className = 'msg'; el.textContent = ''; }, 3000);
}

function getTier(winPct, hpb, fights) {
  if(fights < 2) return 'B';
  if(winPct >= 70 && hpb >= 2.5) return 'S';
  if(winPct >= 50 && hpb >= 2.0) return 'A';
  if(winPct >= 25 || hpb >= 1.5) return 'B';
  return 'C';
}

function tierBadge(t) {
  const cls = {S:'b-s',A:'b-a',B:'b-b',C:'b-c'}[t] || 'b-b';
  return `<span class="badge ${cls}">${t}</span>`;
}

function resultBadge(r) {
  if(r==='win') return '<span class="badge b-win">Победа</span>';
  if(r==='lose') return '<span class="badge b-lose">Поражение</span>';
  if(r==='tp') return '<span class="badge b-tp">ТП</span>';
  return '<span class="badge b-draw">Ничья</span>';
}

function barColor(hpb) {
  if(hpb >= 2.5) return '#00e67a';
  if(hpb >= 2.0) return '#4d9fff';
  if(hpb >= 1.5) return '#ffb300';
  return '#ff4757';
}

function initials(name) {
  return name.slice(0,2).toUpperCase();
}

function renderStats() {
  const battles = load();
  const el = document.getElementById('stats-content');
  if(!battles.length) { el.innerHTML = '<div class="empty">Нет данных. Добавь бои на вкладке "+ Добавить"</div>'; return; }

  const players = {};
  battles.forEach(b => {
    if(!players[b.ourPlayer]) players[b.ourPlayer] = {wins:0,losses:0,draws:0,tp:0,heads:0,bodies:0,dmg:0,fights:0};
    const p = players[b.ourPlayer];
    p.fights++;
    p.heads += b.headsUs || 0;
    p.bodies += b.bodiesUs || 0;
    p.dmg += b.dmgUs || 0;
    if(b.result==='win') p.wins++;
    else if(b.result==='lose') p.losses++;
    else if(b.result==='draw') p.draws++;
    if(b.tp==='tp-us') p.tp++;
  });

  const totalWins = battles.filter(b=>b.result==='win').length;
  const totalLoss = battles.filter(b=>b.result==='lose').length;
  const totalDmgUs = battles.reduce((s,b)=>s+(b.dmgUs||0),0);
  const totalDmgThem = battles.reduce((s,b)=>s+(b.dmgThem||0),0);
  const totalHeadsUs = battles.reduce((s,b)=>s+(b.headsUs||0),0);
  const totalTP = battles.filter(b=>b.tp==='tp-us').length;

  const sorted = Object.entries(players).sort((a,b) => {
    const sa = (a[1].wins/a[1].fights)*100 + (a[1].heads/a[1].fights)*10;
    const sb = (b[1].wins/b[1].fights)*100 + (b[1].heads/b[1].fights)*10;
    return sb - sa;
  });

  const maxHPB = Math.max(...sorted.map(([,p]) => p.fights>0 ? p.heads/p.fights : 0), 0.1);

  const tierGroups = {S:[],A:[],B:[],C:[]};
  sorted.forEach(([name, p]) => {
    const wp = Math.round(p.wins/p.fights*100);
    const hpb = parseFloat((p.heads/p.fights).toFixed(1));
    const tier = getTier(wp, hpb, p.fights);
    tierGroups[tier].push(name);
  });

  const playerRows = sorted.map(([name, p]) => {
    const wp = Math.round(p.wins/p.fights*100);
    const hpb = (p.heads/p.fights).toFixed(1);
    const tier = getTier(wp, parseFloat(hpb), p.fights);
    const bw = Math.round((parseFloat(hpb)/maxHPB)*100);
    const bc = barColor(parseFloat(hpb));
    const tpStr = p.tp > 0 ? `<span class="badge b-tp">${p.tp}</span>` : '—';
    const dmgStr = p.dmg > 0 ? p.dmg.toLocaleString() : '—';
    const avgDmg = p.dmg > 0 ? Math.round(p.dmg/p.fights).toLocaleString() : '—';
    return `<tr>
      <td><strong>${name}</strong></td>
      <td>${p.fights}</td>
      <td style="color:${wp>=50?'var(--green)':'var(--red)'}">${wp}%</td>
      <td>${p.heads}</td>
      <td>
        <div class="bar-row">
          <span style="min-width:24px">${hpb}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${bw}%;background:${bc}"></div></div>
        </div>
      </td>
      <td>${dmgStr}</td>
      <td>${avgDmg}</td>
      <td>${tierBadge(tier)}</td>
      <td>${tpStr}</td>
    </tr>`;
  }).join('');

  const tierHTML = ['S','A','B','C'].map(t => {
    const names = tierGroups[t].join(', ') || '—';
    const cls = {S:'b-s',A:'b-a',B:'b-b',C:'b-c'}[t];
    return `<div class="tier-item">
      <div class="tier-item-label"><span class="badge ${cls}">${t}</span></div>
      <div class="tier-item-names">${names}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Боёв</div><div class="metric-val">${battles.length}</div></div>
      <div class="metric-card"><div class="metric-label">Побед</div><div class="metric-val green">${totalWins}</div></div>
      <div class="metric-card"><div class="metric-label">Поражений</div><div class="metric-val red">${totalLoss}</div></div>
      <div class="metric-card"><div class="metric-label">Хэды</div><div class="metric-val blue">${totalHeadsUs}</div></div>
      <div class="metric-card"><div class="metric-label">Урон наш</div><div class="metric-val">${totalDmgUs>0?totalDmgUs.toLocaleString():'—'}</div></div>
      <div class="metric-card"><div class="metric-label">Урон врагов</div><div class="metric-val">${totalDmgThem>0?totalDmgThem.toLocaleString():'—'}</div></div>
    </div>

    <div class="section-card" style="margin-bottom:16px">
      <div class="section-card-title">Тиры</div>
      <div class="tier-row">${tierHTML}</div>
    </div>

    <div class="section-card">
      <div class="section-card-title">Рейтинг игроков</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Игрок</th><th>Боёв</th><th>%П</th><th>Хэды</th><th style="min-width:120px">Хэд/бой</th><th>Урон</th><th>Ср.урон</th><th>Тир</th><th>ТП</th>
          </tr></thead>
          <tbody>${playerRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderScout() {
  const battles = load();
  const el = document.getElementById('scout-content');
  if(!battles.length) { el.innerHTML = '<div class="empty">Нет данных о соперниках</div>'; return; }

  const enemies = {};
  battles.forEach(b => {
    if(!b.enemyPlayer) return;
    if(!enemies[b.enemyPlayer]) enemies[b.enemyPlayer] = {name:b.enemyPlayer, guild:b.enemyGuild||'?', winsVsUs:0, fights:0, heads:0, dmg:0};
    const e = enemies[b.enemyPlayer];
    e.fights++;
    e.heads += b.headsThem || 0;
    e.dmg += b.dmgThem || 0;
    if(b.result==='lose') e.winsVsUs++;
    if(b.enemyGuild) e.guild = b.enemyGuild;
  });

  const sorted = Object.values(enemies).sort((a,b) => {
    const sa = (a.heads/a.fights)*3 + (a.dmg/a.fights/400);
    const sb = (b.heads/b.fights)*3 + (b.dmg/b.fights/400);
    return sb - sa;
  });

  const cards = sorted.map(e => {
    const hpb = (e.heads/e.fights).toFixed(1);
    const avgDmg = e.dmg > 0 ? Math.round(e.dmg/e.fights).toLocaleString() : '—';
    const wpct = Math.round(e.winsVsUs/e.fights*100);
    let recClass, recText;
    if(parseFloat(hpb) >= 2.5) { recClass='rec-hot'; recText='ВЗЯТЬ'; }
    else if(parseFloat(hpb) >= 1.5) { recClass='rec-mid'; recText='СМОТРЕТЬ'; }
    else { recClass='rec-low'; recText='СЛАБЫЙ'; }
    return `<div class="scout-card">
      <div>
        <div class="scout-name">${e.name}</div>
        <div class="scout-guild">${e.guild} &bull; ${e.fights} ${e.fights===1?'бой':'боёв'}</div>
        <div class="scout-meta">${e.heads} хэдов &bull; ${hpb}/бой &bull; урон ${avgDmg} &bull; выиграл у нас ${wpct}%</div>
      </div>
      <span class="rec-badge ${recClass}">${recText}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px;letter-spacing:0.5px">Сортировка по хэдам за бой — кандидаты в гильдию сверху</div>
    ${cards}
  `;
}

function renderHistory() {
  const battles = load();
  const el = document.getElementById('history-content');
  if(!battles.length) { el.innerHTML = '<div class="empty">История пуста</div>'; return; }

  const rows = [...battles].reverse().map((b,i) => {
    const stageLabel = b.stage==='playoff' ? '<span style="font-size:10px;color:var(--amber)">ЭТАП</span>' : '<span style="font-size:10px;color:var(--text3)">ГРУППА</span>';
    const tpBadge = b.tp!=='none' && b.tp ? ` <span class="badge b-tp" style="font-size:9px">${b.tp==='tp-us'?'ТП НАШ':b.tp==='tp-them'?'ТП ИХ':'НЕЗАХОД'}</span>` : '';
    return `<tr>
      <td>${stageLabel}</td>
      <td><strong>${b.ourPlayer}</strong></td>
      <td style="color:var(--text2)">${b.enemyPlayer} <span style="font-size:10px;color:var(--text3)">(${b.enemyGuild||'?'})</span></td>
      <td><span class="score-display" style="color:${b.result==='win'?'var(--green)':b.result==='lose'?'var(--red)':'var(--text2)'}">${b.scoreUs}:${b.scoreThem}</span></td>
      <td>${resultBadge(b.result)}${tpBadge}</td>
      <td>${b.headsUs||0} vs ${b.headsThem||0}</td>
      <td style="color:var(--text3);font-size:11px">${b.note||'—'}</td>
      <td><button onclick="deleteBattle(${b.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px" title="Удалить">✕</button></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="section-card">
      <div class="section-card-title">Все бои (${battles.length})</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Этап</th><th>Наш</th><th>Соперник</th><th>Счёт</th><th>Итог</th><th>Хэды</th><th>Заметка</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function deleteBattle(id) {
  const battles = load().filter(b => b.id !== id);
  save(battles);
  renderHistory();
}

function showClearDialog() { document.getElementById('overlay').classList.add('show'); }
function hideClearDialog() { document.getElementById('overlay').classList.remove('show'); }
function confirmClear() {
  localStorage.removeItem(STORE_KEY);
  hideClearDialog();
  document.getElementById('stats-content').innerHTML = '<div class="empty">Нет данных</div>';
  document.getElementById('scout-content').innerHTML = '<div class="empty">Нет данных</div>';
  document.getElementById('history-content').innerHTML = '<div class="empty">История пуста</div>';
}
</script>
</body>
</html>
