<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MANERA SNS</title>
    <style>
        body { background: #0a0c0f; color: #fff; font-family: sans-serif; margin: 0; }
        .header { text-align: center; padding: 20px; color: #00f0ff; }
        .nav { display: flex; justify-content: space-around; background: #111; padding: 15px; border-bottom: 2px solid #333; }
        .tab { cursor: pointer; color: #aaa; font-weight: bold; }
        .tab.active { color: #00f0ff; border-bottom: 2px solid #00f0ff; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #fff; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="header"><h1>MANERA SNS</h1></div>
    <div class="nav">
        <div class="tab active" onclick="show('stats', this)">СТАТИСТИКА</div>
        <div class="tab" onclick="show('scout', this)">СКАУТ</div>
        <div class="tab" onclick="show('chat', this)">ЧАТ</div>
    </div>

    <div id="stats" class="content active"><h2>Статистика боев</h2><div id="statsData">Загрузка...</div></div>
    <div id="scout" class="content"><h2>Скаутинг</h2><p>Данные в разработке.</p></div>
    <div id="chat" class="content"><h2>Общий чат</h2><div id="msgContainer"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyNi8TRsgZykBYVkzIL3N65VfWte4fnlM",
            authDomain: "manera-sns.firebaseapp.com",
            projectId: "manera-sns",
            storageBucket: "manera-sns.appspot.com",
            messagingSenderId: "722470175371",
            appId: "1:722470175371:web:1131f004200e93c75c4a"
        };
        initializeApp(firebaseConfig);
        
        window.show = function(id, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };
    </script>
</body>
</html>
