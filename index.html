<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MANERA SNS - Трекер</title>
    <style>
        body { background: #0a0c0f; color: #fff; font-family: sans-serif; margin: 0; }
        .nav { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #333; }
        .tab { cursor: pointer; padding: 10px; color: #888; }
        .tab.active { color: #00f0ff; border-bottom: 2px solid #00f0ff; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="tab active" onclick="show('stats')">Статистика</div>
        <div class="tab" onclick="show('scout')">Скаут</div>
        <div class="tab" onclick="show('chat')">Чат</div>
    </div>
    <div id="stats" class="content active"><h2>Статистика</h2><p>База подключена.</p></div>
    <div id="scout" class="content"><h2>Скаутинг</h2></div>
    <div id="chat" class="content"><h2>Чат</h2><div id="msg"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCyNi8TRsgZykBYVkzIL3N65VfWte4fnlM",
            authDomain: "manera-sns.firebaseapp.com",
            projectId: "manera-sns",
            storageBucket: "manera-sns.appspot.com",
            messagingSenderId: "722470175371",
            appId: "1:722470175371:web:1131f004200e93c75c4a"
        };
        initializeApp(firebaseConfig);
        window.show = function(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
